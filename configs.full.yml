## THIS FILE SHOW THE COMPLETE CONFIGURATION OPTIONS, THEIR DEFAULT VALUES, AND DOCUMENTATION.

preferences:

defaults:
  # Directory containing stimuli playlists (audio files).
  # This directory will be searched recursively, so specify the closest common path to your stimuli will improve performance.
  stimuli_directory: "../Stimuli/playlists" 

  # Path to the master metadata table Excel file
  master_metadata_table: "../Place Preferences - Master Metadata.xlsx"

  # Root directory containing EthoVision projects (each sub-directory is an EthoVision project folder)
  ethovision_data_root: "../ETHOVISION"

  # Set the preferred binaries for extracting audio metadata
  # By default, the included ./metadata_extract (.exe on Windows) will be used
  # However, you can override this to use a custom build if desired
  audio_metadata_extract_bin: #"./src/+io/+stimuli/metadata_extract.exe" # When not specfied, the pre-bundled binary will be used (path shown here)
  # If the metadata_extract binary is not found anywhere, you can also specify the path to the full nidaq_audioplayer executable app as alternative
  nidaq_audioplayer_bin: #"%LOCALAPPDATA%/NI-DAQmxAudioPlayer/nidaq_audioplayer.exe" # This is the default installation path, though update to reflect your actual installation if needed

project_settings:
  EthoVision:
    # Default settings applied to all sub-categories unless overridden 
    default_camera_imgwidth_fov_cm: 58.5 # The actual width of the camera's field of view in cm, such that the pixelsize = FOV_cm / image_width_pixels. Default is shown here.
    default_camera_center_offset_px: [0, 0] # EthoVision coordinates' origin is the center of the image; specify an offset here if your arena/area of interest is not perfectly centered in the camera view. Default is [0,0].
    default_zone_match_method: "startsWith"  # method to match the zone name set here to the ones set in EthoVision; one of these: "exact", "startsWith", "endsWith", "contains". Default is "startsWith".

    arena:
      # When using multiple arenas or different arena configs exist, specify them here
      # Just make sure the names match those used in EthoVision
      # The arenas set here should be a superset of all arenas used in your experiments

      - name: "Arena 1" # required: name of the arena as specified in EthoVision
        camera_imgwidth_fov_cm: 58.5
        camera_center_offset_px: [0, 0]
        zone: # required: list of zone names as specified in EthoVision for this arena matched to left/right sides of the place preference setup
          left: Left
          right: Right
        zone_match_method: "startsWith"

      - name: "Lily Booth"
        camera_imgwidth_fov_cm: 77.4
        camera_center_offset_px: [960, 0]
        zone:
          left: Left 1
          right: Right 1
        zone_match_method: "exact"
      
      - name: "Rain Booth"
        camera_imgwidth_fov_cm: 77.4
        camera_center_offset_px: [-960, 0]
        zone:
          left: Left 2
          right: Right 2
        zone_match_method: "exact"